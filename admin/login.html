<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Tomaso Pignocchi</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300&family=Cormorant+Garant:wght@300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f5f2ec;
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1a1814;
    }
    .box { width: min(420px, calc(100vw - 3rem)); }
    h1 {
      font-family: 'Cormorant Garant', serif;
      font-weight: 300;
      font-size: 1.55rem;
      letter-spacing: 0.02em;
      margin-bottom: 0.35rem;
    }
    .sub {
      font-size: 0.52rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #8a8480;
      margin-bottom: 1.6rem;
    }
    p {
      font-size: 0.7rem;
      line-height: 1.9;
      color: #3e3b36;
      margin-bottom: 1.35rem;
    }
    .btn {
      display: inline-block;
      border: none;
      background: #1a1814;
      color: #f5f2ec;
      padding: 0.8rem 1rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.56rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.82; }
    .back {
      display: block;
      margin-top: 1.4rem;
      font-size: 0.5rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #8a8480;
      text-decoration: none;
    }
    .back:hover { color: #1a1814; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Admin Panel</h1>
    <p class="sub">Cloudflare Zero Trust</p>
    <p>
      This admin area is protected by Cloudflare Access. There is no password stored in the browser anymore.
    </p>
    <p>
      If your Access policy is configured, continue below and Cloudflare will handle authentication before loading the admin panel.
    </p>
    <a class="btn" href="index.html">Enter admin →</a>
    <a class="back" href="../index.html">← Back to site</a>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="assets/favicon-asterisk-black.svg" type="image/svg+xml" media="(prefers-color-scheme: light)" />
  <link rel="icon" href="assets/favicon-asterisk-white.svg" type="image/svg+xml" media="(prefers-color-scheme: dark)" />
  <link rel="icon" href="assets/favicon-asterisk-black.svg" type="image/svg+xml" />
  <title>Tomaso Pignocchi — Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400&family=New+Computer+Modern:ital,wght@0,400;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garant:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Spectral:ital,wght@0,300;0,400;0,600;1,400&family=Lato:wght@300;400;700&family=Inter:wght@300;400;600&family=Source+Sans+3:ital,wght@0,300;0,400;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:#0d0d0d;
      --text:#e2ddd6;
      --muted:#8f8983;
      --rule:#222;
      --gutter:clamp(1.5rem,4vw,3.2rem);
      --max-w:1200px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'EB Garamond', serif;
    }


    .wrap{max-width:var(--max-w);margin:0 auto;padding-left:var(--gutter);padding-right:var(--gutter)}

    /* ── Photo bio intro ── */
    .photo-bio-section {
      padding: 0 0 1.6rem;
      border-bottom: none;
    }
    .photo-bio-section p {
      font-family: var(--font-photo, 'EB Garamond', serif);
      font-size: calc(clamp(1rem, 1.5vw, 1.12rem) * var(--sz-photo, 1));
      line-height: 1.78;
      color: var(--color-photo, var(--text));
      opacity: 0.75;
      text-align: justify;
      hyphens: auto;
      max-width: 72ch;
    }

    /* ── HEADER ── */
    .site-nav{
      position:sticky;top:0;z-index:100;
      background:var(--bg);border-bottom:none;
      height:54px;
    }
    .site-nav .wrap{height:100%;display:flex;align-items:center;justify-content:space-between}
    .nav-logo{display:flex;align-items:center;text-decoration:none;gap:0.8rem}
    .logo-mark{height:20px;width:auto;display:block;object-fit:contain;flex-shrink:0}
    .nav-site-name{
      font-family:var(--font-name, 'EB Garamond', serif);font-weight:var(--wt-name, 400);
      font-size:calc(1rem * var(--sz-secondary-title,1));color:var(--color-name, var(--text));letter-spacing:-0.01em;
    }
    .nav-right{display:flex;gap:2rem}
    .nav-right a{
      font-family:'Inter', sans-serif;font-weight:300;font-size:0.6rem;
      letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);
      text-decoration:none;transition:color 0.2s;
    }
    .nav-right a:hover{color:var(--text)}
    .nav-right a.active{color:var(--text);border-bottom:0.5px solid var(--text)}

    /* ── SERIES FILTER ── */
    .series-bar {
      display: flex;
      gap: 0;
      overflow-x: auto;
      border-bottom: none;
      padding: 0;
      margin: 0 0 1.2rem;
    }

    .series-btn {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 0.5px solid transparent;
      padding: 0.2rem 1.2rem 0.5rem 0;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
      margin-bottom: 0;
    }
    .series-btn:hover { color: var(--text); }
    .series-btn.active { color: var(--text); border-bottom-color: var(--text); }

    /* ── GRID ── */
    .grid-wrap {
      width: 100%;
      max-width: none;
      padding: 1.5rem 0 4rem;
    }

    .gallery-wrap {
      width: 100%;
      max-width: none;
      padding-left: 0;
      padding-right: 0;
    }

    .photo-grid {
      columns: 3;
      column-gap: 6px;
    }

    @media (max-width: 800px) { .photo-grid { columns: 2; } }
    @media (max-width: 480px) { .photo-grid { columns: 1; } }

    .photo-item {
      break-inside: avoid;
      margin-bottom: 6px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      display: block;
    }

    .photo-item img {
      width: 100%;
      display: block;
      filter: none;
      transform: scale(1);
      transition: transform 0.4s ease;
      pointer-events: none;   /* drag protection */
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
    }

    .photo-item:hover img {
      transform: scale(1.04);
    }

    .photo-item .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      display: flex;
      align-items: flex-end;
      padding: 1rem;
      opacity: 0;
      transition: opacity 0.3s;
      cursor: pointer;        /* overlay captures all clicks instead of img */
    }
    .photo-item:hover .overlay { opacity: 1; }

    .photo-item .overlay span {
      font-family: 'DM Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      padding: 4rem 2.4rem;
      text-align: center;
      color: var(--muted);
    }

    .empty-state p {
      font-size: 0.9rem;
      line-height: 1.8;
    }

    .empty-state a {
      font-family: 'DM Mono', monospace;
      font-size: 0.54rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid #333;
      padding-bottom: 1px;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.96);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 2rem;
    }

    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 90vw;
      max-height: 80vh;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
    }

    .lightbox-meta {
      margin-top: 1.2rem;
      text-align: center;
    }

    .lightbox-meta .lb-title {
      font-size: 0.95rem;
      color: var(--text);
    }

    .lightbox-meta .lb-sub {
      font-family: 'DM Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.4rem;
    }

    .lightbox-close {
      position: absolute;
      top: 1.4rem;
      right: 1.8rem;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.4rem;
      cursor: pointer;
      transition: color 0.2s;
      line-height: 1;
    }
    .lightbox-close:hover { color: var(--text); }

    .lb-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.6rem;
      cursor: pointer;
      padding: 1rem;
      transition: color 0.2s;
    }
    .lb-nav:hover { color: var(--text); }
    .lb-prev { left: 1rem; }
    .lb-next { right: 1rem; }

    /* ── FOOTER ── */
    footer{border-top:none}
    footer .wrap{padding:1.4rem 0;display:flex;justify-content:space-between}
    footer p{font-family:'Inter', sans-serif;font-weight:300;font-size:0.5rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)}

    @media (max-width: 580px) {
      .nav-right{gap:1rem}
      .grid-wrap { padding: 1rem 0 3rem; }
      footer .wrap{padding:1rem 0;}
    }
  </style>
</head>

    let filtered  = [];
    let activeSeries = 'all';
    let lbIndex = 0;

    /* ── Fallback demo photos (shown if Contentful not connected) ── */
    const DEMO_PHOTOS = [
      { title: 'Rome', image: 'https://www.tomasopignocchi.com/wp-content/uploads/2021/12/banner_bike_r_L.jpg', series: 'Rome', year: 2022, location: 'Rome' },
      { title: 'Together', image: 'https://www.tomasopignocchi.com/wp-content/uploads/2022/03/banner_together.jpg', series: 'People', year: 2022, location: 'Rome' },
      { title: 'Colosseum', image: 'https://www.tomasopignocchi.com/wp-content/uploads/2022/01/banner_colosseo2.jpg', series: 'Rome', year: 2022, location: 'Rome' },
      { title: 'Feet', image: 'https://www.tomasopignocchi.com/wp-content/uploads/2021/12/banner_piedi_L.jpg', series: 'People', year: 2021, location: 'Rome' },
      { title: 'Grom', image: 'https://www.tomasopignocchi.com/wp-content/uploads/2022/03/grom_banner.jpg', series: 'Street', year: 2022, location: 'Rome' },
    ];

    /* ── Init ── */
    async function init() {
      let photos = [];

      if (CF.isConnected()) {
        try {
          photos = await CF.get('photo') || [];
          /* sort newest first */
          photos.sort((a, b) => (b.year || 0) - (a.year || 0));
        } catch (e) {
          console.warn('Contentful error, using demo photos', e);
          photos = DEMO_PHOTOS;
        }
      } else {
        photos = DEMO_PHOTOS;
      }

      allPhotos = photos;
      buildSeriesNav(photos);
      showPhotos(photos);
    }

    function buildSeriesNav(photos) {
      const seriesBar = document.getElementById('seriesBar');
      const names = [...new Set(photos.map(p => p.series).filter(Boolean))].sort();
      names.forEach(name => {
        const btn = document.createElement('button');
        btn.className = 'series-btn';
        btn.dataset.series = name;
        btn.textContent = name;
        btn.addEventListener('click', () => filterBySeries(name));
        seriesBar.appendChild(btn);
      });
      /* wire all button */
      seriesBar.querySelector('[data-series="all"]')
        .addEventListener('click', () => filterBySeries('all'));
    }

    function filterBySeries(series) {
      activeSeries = series;
      document.querySelectorAll('.series-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.series === series);
      });
      const photos = series === 'all'
        ? allPhotos
        : allPhotos.filter(p => p.series === series);
      showPhotos(photos);
    }

    function showPhotos(photos) {
      filtered = photos;
      const grid = document.getElementById('photoGrid');
      const empty = document.getElementById('emptyState');
      grid.innerHTML = '';

      if (!photos.length) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      photos.forEach((photo, i) => {
        const item = document.createElement('div');
        item.className = 'photo-item';
        const sub = [photo.series, photo.year, photo.location].filter(Boolean).join(' · ');
        item.innerHTML = `
          <img src="${photo.image}" alt="${photo.title || ''}" loading="lazy" />
          <div class="overlay"><span>${sub}</span></div>
        `;
        item.addEventListener('click', () => openLightbox(i));
        grid.appendChild(item);
      });
    }

    /* ── Lightbox ── */
    function openLightbox(i) {
      lbIndex = i;
      renderLightbox();
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    function renderLightbox() {
      const p = filtered[lbIndex];
      document.getElementById('lbImg').src = p.image;
      document.getElementById('lbImg').alt = p.title || '';
      document.getElementById('lbTitle').textContent = p.caption || p.title || '';
      const sub = [p.series, p.location, p.year].filter(Boolean).join(' · ');
      document.getElementById('lbSub').textContent = sub;
    }

    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    document.getElementById('lightbox').addEventListener('click', e => {
      if (e.target === document.getElementById('lightbox')) closeLightbox();
    });
    document.getElementById('lbPrev').addEventListener('click', e => {
      e.stopPropagation();
      lbIndex = (lbIndex - 1 + filtered.length) % filtered.length;
      renderLightbox();
    });
    document.getElementById('lbNext').addEventListener('click', e => {
      e.stopPropagation();
      lbIndex = (lbIndex + 1) % filtered.length;
      renderLightbox();
    });
    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') { lbIndex = (lbIndex - 1 + filtered.length) % filtered.length; renderLightbox(); }
      if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % filtered.length; renderLightbox(); }
    });

    /* ── Photo protection ── */
    /* Block right-click on images */
    document.addEventListener('contextmenu', e => {
      if (e.target.tagName === 'IMG') e.preventDefault();
    });
    /* Block drag on images */
    document.addEventListener('dragstart', e => {
      if (e.target.tagName === 'IMG') e.preventDefault();
    });

    init();
  </script>

  <script>
    /* ── Load photo bio + settings from Contentful ── */
    (async function() {
      try {
        const FONT_CSS = {
          'EB Garamond': "'EB Garamond', serif",
          'New Computer Modern': "'New Computer Modern', serif",
          'Libre Baskerville': "'Libre Baskerville', serif",
          'Playfair Display': "'Playfair Display', serif",
          'Cormorant Garant': "'Cormorant Garant', serif",
          'Spectral': "'Spectral', serif",
          'Lato': "'Lato', sans-serif",
          'Inter': "'Inter', sans-serif",
          'Source Sans Pro': "'Source Sans 3', sans-serif",
          'DM Mono': "'DM Mono', monospace"
        };
        function setSiteTitle(name) {
          const clean = (name || 'Tomaso Pignocchi').trim();
          const nav = document.getElementById('photoSiteName');
          if (nav) nav.textContent = clean;
          const footer = document.getElementById('footerNamePhoto');
          if (footer) footer.textContent = '© 2026 ' + clean;
          document.title = clean + ' — Photography';
        }
        setSiteTitle('Tomaso Pignocchi');
        const qs = new URLSearchParams({ content_type: 'siteContent', limit: 50 });
        const r = await fetch(
          'https://cdn.contentful.com/spaces/fejt7dmbrv9e/environments/master/entries?' + qs,
          { headers: { Authorization: 'Bearer tOHgPb2AaW4raBzCEnxzs5QhFMnNdyOGJDF3sTKGAgc' } }
        );
        const data = await r.json();
        const mainItem = (data.items || []).find(item => item?.fields?.key === 'main') || (data.items && data.items[0]);
        try {
          const qsSettings = new URLSearchParams({ content_type:'siteSettings', include:1, limit:100 });
          const rs = await fetch(
            'https://cdn.contentful.com/spaces/fejt7dmbrv9e/environments/master/entries?' + qsSettings,
            { headers: { Authorization: 'Bearer tOHgPb2AaW4raBzCEnxzs5QhFMnNdyOGJDF3sTKGAgc' } }
          );
          const ds = await rs.json();
          const settingsItem = (ds.items || []).find(item => item?.fields?.key === 'main') || (ds.items && ds.items[0]);
          const ss = settingsItem ? settingsItem.fields : null;
          if (ss && ss.siteTitle) setSiteTitle(ss.siteTitle);
          if (ss && ss.secondaryTitleSize != null) document.documentElement.style.setProperty('--sz-secondary-title', ss.secondaryTitleSize / 100);
        } catch (_) {}
        if (mainItem) {
          const sc = mainItem.fields;
          const el = document.getElementById('photoBioText');
          if (el && sc.photoIntro) el.innerHTML = sc.photoIntro.replace(/\n/g, '<br>');
          /* Apply typography settings */
          const root = document.documentElement;
          if (sc.sizePhotoIntro != null) root.style.setProperty('--sz-photo', sc.sizePhotoIntro / 100);
          if (sc.photoFont)      root.style.setProperty('--font-photo', FONT_CSS[sc.photoFont] || sc.photoFont);
          if (sc.photoFontWeight)root.style.setProperty('--wt-photo', sc.photoFontWeight);
          if (sc.photoColor)     root.style.setProperty('--color-photo', sc.photoColor);
          if (sc.nameFont)       root.style.setProperty('--font-name', FONT_CSS[sc.nameFont] || sc.nameFont);
          if (sc.nameFontWeight) root.style.setProperty('--wt-name', sc.nameFontWeight);
          if (sc.nameColor)      root.style.setProperty('--color-name', sc.nameColor);
          /* Apply colors */
          if (sc.bgColor)    root.style.setProperty('--bg', sc.bgColor);
          if (sc.textColor)  root.style.setProperty('--text', sc.textColor);
          if (sc.logoVariant) {
            const logo = document.querySelector('.logo-mark');
            if (logo) logo.src = sc.logoVariant === 'light' ? 'assets/asterisco-white.svg' : 'assets/asterisco-black.svg';
          }
        }
      } catch(e) { console.warn('Bio load error', e); }
    })();
  </script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tomaso Pignocchi — Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&family=DM+Mono:wght@300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #0d0d0d;
      --text:  #e2ddd6;
      --muted: #666;
      --rule:  #222;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'EB Garamond', serif;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.4rem 2.4rem;
      border-bottom: 1px solid var(--rule);
    }

    .site-id {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      text-decoration: none;
    }

    .site-id .name {
      font-family: 'EB Garamond', serif;
      font-size: 1rem;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .site-id .logo-mark {
      height: 1rem;
      width: auto;
      object-fit: contain;
      flex-shrink: 0;
          }

    .site-id .section {
      font-family: 'DM Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .back-link {
      font-family: 'DM Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--text); }

    /* ── SERIES FILTER ── */
    .series-bar {
      display: flex;
      gap: 0;
      overflow-x: auto;
      border-bottom: 1px solid var(--rule);
      padding: 0 2.4rem;
    }

    .series-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 0.9rem 1.2rem 0.8rem;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
      margin-bottom: -1px;
    }
    .series-btn:hover { color: var(--text); }
    .series-btn.active { color: var(--text); border-bottom-color: var(--text); }

    /* ── GRID ── */
    .grid-wrap {
      padding: 1.5rem 1.5rem 4rem;
    }

    .photo-grid {
      columns: 3;
      column-gap: 6px;
    }

    @media (max-width: 800px) { .photo-grid { columns: 2; } }
    @media (max-width: 480px) { .photo-grid { columns: 1; } }

    .photo-item {
      break-inside: avoid;
      margin-bottom: 6px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      display: block;
    }

    .photo-item img {
      width: 100%;
      display: block;
      filter: grayscale(100%) brightness(0.82);
      transform: scale(1.03);
      transition: filter 0.5s ease, transform 0.5s ease;
      pointer-events: none;   /* drag protection */
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
    }

    .photo-item:hover img {
      filter: grayscale(0%) brightness(0.95);
      transform: scale(1);
    }

    .photo-item .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      display: flex;
      align-items: flex-end;
      padding: 1rem;
      opacity: 0;
      transition: opacity 0.3s;
      cursor: pointer;        /* overlay captures all clicks instead of img */
    }
    .photo-item:hover .overlay { opacity: 1; }

    .photo-item .overlay span {
      font-family: 'DM Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      padding: 4rem 2.4rem;
      text-align: center;
      color: var(--muted);
    }

    .empty-state p {
      font-size: 0.9rem;
      line-height: 1.8;
    }

    .empty-state a {
      font-family: 'DM Mono', monospace;
      font-size: 0.54rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid #333;
      padding-bottom: 1px;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.96);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 2rem;
    }

    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 90vw;
      max-height: 80vh;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
    }

    .lightbox-meta {
      margin-top: 1.2rem;
      text-align: center;
    }

    .lightbox-meta .lb-title {
      font-size: 0.95rem;
      color: var(--text);
    }

    .lightbox-meta .lb-sub {
      font-family: 'DM Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.4rem;
    }

    .lightbox-close {
      position: absolute;
      top: 1.4rem;
      right: 1.8rem;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.4rem;
      cursor: pointer;
      transition: color 0.2s;
      line-height: 1;
    }
    .lightbox-close:hover { color: var(--text); }

    .lb-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.6rem;
      cursor: pointer;
      padding: 1rem;
      transition: color 0.2s;
    }
    .lb-nav:hover { color: var(--text); }
    .lb-prev { left: 1rem; }
    .lb-next { right: 1rem; }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--rule);
      padding: 1.2rem 2.4rem;
      display: flex;
      justify-content: space-between;
    }

    footer p {
      font-family: 'DM Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    @media (max-width: 580px) {
      header { padding: 1rem 1.2rem; }
      .series-bar { padding: 0 1.2rem; }
      .grid-wrap { padding: 1rem 1rem 3rem; }
      footer { padding: 1rem 1.2rem; }
    }
  </style>
</head>

      { title: 'Feet', image: 'https://www.tomasopignocchi.com/wp-content/uploads/2021/12/banner_piedi_L.jpg', series: 'People', year: 2021, location: 'Rome' },
      { title: 'Grom', image: 'https://www.tomasopignocchi.com/wp-content/uploads/2022/03/grom_banner.jpg', series: 'Street', year: 2022, location: 'Rome' },
    ];

    /* ── Init ── */
    async function init() {
      let photos = [];

      if (CF.isConnected()) {
        try {
          photos = await CF.get('photo') || [];
          /* sort newest first */
          photos.sort((a, b) => (b.year || 0) - (a.year || 0));
        } catch (e) {
          console.warn('Contentful error, using demo photos', e);
          photos = DEMO_PHOTOS;
        }
      } else {
        photos = DEMO_PHOTOS;
      }

      allPhotos = photos;
      buildSeriesNav(photos);
      showPhotos(photos);
    }

    function buildSeriesNav(photos) {
      const seriesBar = document.getElementById('seriesBar');
      const names = [...new Set(photos.map(p => p.series).filter(Boolean))].sort();
      names.forEach(name => {
        const btn = document.createElement('button');
        btn.className = 'series-btn';
        btn.dataset.series = name;
        btn.textContent = name;
        btn.addEventListener('click', () => filterBySeries(name));
        seriesBar.appendChild(btn);
      });
      /* wire all button */
      seriesBar.querySelector('[data-series="all"]')
        .addEventListener('click', () => filterBySeries('all'));
    }

    function filterBySeries(series) {
      activeSeries = series;
      document.querySelectorAll('.series-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.series === series);
      });
      const photos = series === 'all'
        ? allPhotos
        : allPhotos.filter(p => p.series === series);
      showPhotos(photos);
    }

    function showPhotos(photos) {
      filtered = photos;
      const grid = document.getElementById('photoGrid');
      const empty = document.getElementById('emptyState');
      grid.innerHTML = '';

      if (!photos.length) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      photos.forEach((photo, i) => {
        const item = document.createElement('div');
        item.className = 'photo-item';
        const sub = [photo.series, photo.year, photo.location].filter(Boolean).join(' · ');
        item.innerHTML = `
          <img src="${photo.image}" alt="${photo.title || ''}" loading="lazy" />
          <div class="overlay"><span>${sub}</span></div>
        `;
        item.addEventListener('click', () => openLightbox(i));
        grid.appendChild(item);
      });
    }

    /* ── Lightbox ── */
    function openLightbox(i) {
      lbIndex = i;
      renderLightbox();
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    function renderLightbox() {
      const p = filtered[lbIndex];
      document.getElementById('lbImg').src = p.image;
      document.getElementById('lbImg').alt = p.title || '';
      document.getElementById('lbTitle').textContent = p.caption || p.title || '';
      const sub = [p.series, p.location, p.year].filter(Boolean).join(' · ');
      document.getElementById('lbSub').textContent = sub;
    }

    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    document.getElementById('lightbox').addEventListener('click', e => {
      if (e.target === document.getElementById('lightbox')) closeLightbox();
    });
    document.getElementById('lbPrev').addEventListener('click', e => {
      e.stopPropagation();
      lbIndex = (lbIndex - 1 + filtered.length) % filtered.length;
      renderLightbox();
    });
    document.getElementById('lbNext').addEventListener('click', e => {
      e.stopPropagation();
      lbIndex = (lbIndex + 1) % filtered.length;
      renderLightbox();
    });
    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') { lbIndex = (lbIndex - 1 + filtered.length) % filtered.length; renderLightbox(); }
      if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % filtered.length; renderLightbox(); }
    });

    /* ── Photo protection ── */
    /* Block right-click on images */
    document.addEventListener('contextmenu', e => {
      if (e.target.tagName === 'IMG') e.preventDefault();
    });
    /* Block drag on images */
    document.addEventListener('dragstart', e => {
      if (e.target.tagName === 'IMG') e.preventDefault();
    });

    init();
  </script>
</body>
</html>
